name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run lint
        run: bash scripts/lint.sh

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      DB_PATH: /tmp/app.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest app/tests -v

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      DB_PATH: /tmp/app.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify application package imports
        run: python -c "import app, app.main, app.db, app.validate; print('app package OK')"